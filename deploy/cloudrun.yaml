apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: patent-analyzer
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/maxScale: "3"
        run.googleapis.com/cpu-throttling: "false"
    spec:
      serviceAccountName: amie-backend-sa@aime-hello-world.iam.gserviceaccount.com
      containerConcurrency: 1
      timeoutSeconds: 900
      containers:
        - image: gcr.io/aime-hello-world/patent-analyzer:latest
          ports:
            - containerPort: 8000
          env:
            - name: GC_PROJECT
              value: "aime-hello-world"
            - name: LLM_MODEL
              value: "gemini-2.0-flash"
            - name: SERPAPI_KEY
              value: "CHANGE_ME"
            - name: OPENALEX_KEY
              value: "CHANGE_ME"
            - name: OUTPUT_DIR
              value: "/tmp/outputs"
          resources:
            limits:
              memory: "4Gi"
              cpu: "2"
