services:
  patent-analyzer:
    build: .
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - SERPAPI_KEY=${SERPAPI_KEY}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}
      - OUTPUT_DIR=/app/outputs
    volumes:
      - ./outputs:/app/outputs
