services:
  patent-analyzer:
    build: .
    ports:
      - "8000:8000"
    environment:
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.openai.com/v1}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o}
      - SERPAPI_KEY=${SERPAPI_KEY}
      - OUTPUT_DIR=/app/outputs
    volumes:
      - ./outputs:/app/outputs
