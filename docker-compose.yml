services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - GC_PROJECT=${GC_PROJECT:-aime-hello-world}
      - LLM_MODEL=${LLM_MODEL:-gemini-2.0-flash}
      - SERPAPI_KEY=${SERPAPI_KEY}
      - OPENALEX_KEY=${OPENALEX_KEY:-}
      - OUTPUT_DIR=/app/outputs
    volumes:
      - ./outputs:/app/outputs

  frontend:
    build: ./frontend
    ports:
      - "8080:8080"
    environment:
      - BACKEND_URL=http://backend:8000
      - BACKEND_ENV=dev
    depends_on:
      - backend
